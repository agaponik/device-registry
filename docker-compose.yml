version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: device-registry-postgres
    environment:
      POSTGRES_DB: device_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dr_data:/var/lib/postgresql
    networks:
      - device-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dr_data:

networks:
  device-network:
    driver: bridge

